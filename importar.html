<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Importar datos a Firebase</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    body{font-family:sans-serif;max-width:560px;margin:80px auto;padding:20px;background:#f5f5f5}
    h2{color:#1b4332}
    .btn{background:#1b4332;color:white;border:none;padding:14px 28px;border-radius:8px;font-size:16px;cursor:pointer;margin-top:12px}
    .btn:hover{background:#2d6a4f}
    input[type=file]{margin-top:16px;font-size:14px}
    #log{margin-top:20px;background:white;border-radius:8px;padding:16px;font-size:14px;line-height:2;border:1px solid #ddd}
    .ok{color:#2d6a4f;font-weight:700} .err{color:#e44258;font-weight:700}
  </style>
</head>
<body>
  <h2>☁ Importar datos a Firebase</h2>
  <p>Abre esta página desde <b>baumappadm.github.io</b>, selecciona el archivo JSON exportado y sube a Firebase.</p>
  <input type="file" id="file-input" accept=".json">
  <br>
  <button class="btn" onclick="importData()">Importar a Firebase</button>
  <div id="log">Selecciona el archivo JSON primero.</div>
  <script>
    firebase.initializeApp({apiKey:"AIzaSyB4fNbtTwQo4PtVDh35R33A6lZSOz3rvu4",authDomain:"baumsystem-crm-dc27e.firebaseapp.com",projectId:"baumsystem-crm-dc27e",storageBucket:"baumsystem-crm-dc27e.firebasestorage.app",messagingSenderId:"477326410630",appId:"1:477326410630:web:afefbe8dfab289bd1d2207"});
    const db = firebase.firestore();
    function log(msg,type=''){document.getElementById('log').innerHTML+=`<div class="${type}">${msg}</div>`;}
    async function importData(){
      const file = document.getElementById('file-input').files[0];
      if(!file){alert('Selecciona el archivo JSON primero');return;}
      document.getElementById('log').innerHTML='';
      const text = await file.text();
      let data;
      try{data=JSON.parse(text);}catch(e){log('❌ Archivo JSON inválido','err');return;}
      const baHa = (data.ba.clients||[]).reduce((s,c)=>s+(parseFloat(c.hectaresPotential||c.hectares)||0),0);
      log(`Datos leídos: ${(data.ba.clients||[]).length} clientes BaumApp · ${baHa.toLocaleString('es-CL',{maximumFractionDigits:1})} ha`);
      log(`Exportado: ${data.exportedAt}`);
      log('Subiendo a Firebase…');
      try{
        const ts = new Date().toISOString();
        await db.collection('crm').doc('ba').set({...data.ba, updatedAt:ts});
        log('✅ BaumApp guardado','ok');
        await db.collection('crm').doc('bs').set({...data.bs, updatedAt:ts});
        log('✅ BaumSystem guardado','ok');
        await db.collection('crm').doc('settings').set({...data.settings, updatedAt:ts});
        log('✅ Configuración guardada','ok');
        log('🎉 ¡Listo! Abre el CRM y verifica los datos.','ok');
      }catch(e){
        log('❌ Error Firebase: '+e.message,'err');
        console.error(e);
      }
    }
  </script>
</body>
</html>
